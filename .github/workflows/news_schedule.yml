name: 뉴스봇 자동 실행

on:
  schedule:
    # 매일 오전 7시 30분 (KST) = UTC 22:30 전날
    - cron: "30 22 * * *"
  workflow_dispatch:   # 수동 실행 버튼도 활성화

jobs:
  run-news-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install feedparser anthropic requests python-dotenv

      - name: 카카오 토큰 파일 복원
        run: |
          echo '${{ secrets.KAKAO_TOKEN_JSON }}' > kakao_token.json

      - name: 뉴스봇 실행
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        run: python news_bot.py

      - name: 갱신된 토큰 저장 (선택사항)
        # 토큰이 갱신됐을 경우 Secret 업데이트하려면 별도 스크립트 필요
        run: echo "토큰 갱신 완료 (kakao_token.json 로컬 저장)"
